<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="bootstrap.min.css">
</head>
<body>
<header class="border-bottom mb-3 p-3 bg-white  d-flex justify-content-between align-items-center">
        <h1 class="text-primary " >Admin Panel</h1>
        <a href="index.html" class="btn btn-outline-primary"> Home</a>
    </header>
    <div class="d-flex justify-content-center align-items-center w-100" >
        <div class="  card bg-white rounded shadow d-flex  flex-column justify-content-center align-items-center p-4" style=" width:100%; max-width:400px">
            <h2 class="text-primary">Welcome Back</h2>
            <p>Sign in to Your account</p>
            <form action="" class="w-100">
               
                <div class="d-flex flex-column mt-2">
                    <label for="" class="form-label">Email Address</label>
                    <input type="email" class="form-control  placeholder="Email">
                </div>
                <div class="d-flex flex-column mt-2">
                    <label for="" class="form-label">Password</label>
                    <input type="password" class="form-control placeholder="Password">
                </div>
                <div class="d-flex justify-content-between align-items-center mt-2"> 
                    <div class="mt-2">
                          <input type="checkbox" name="" id="" class="form-check-input">
                          <label for="" class="form-label">Remember me</label>
                    </div>
                    <a href="">Forget Password</a>
              
                </div>
                <div>
                    <button class="btn btn-primary w-100 mt-2">Sign In</button>
                </div>
                <hr>
                <div>
                    Don't have an account ? <a href="signUp.html">Sign Up</a>
                </div>
            </form>
        </div>
    </div>
    
</body>
</html>
